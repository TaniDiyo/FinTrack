version: "3.9"

services:

  backend:
    build: ./backend
    container_name: fintrack_backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    restart: always

  frontend:
    build: ./frontend

    container_name: fintrack_frontend

    ports:
      - "80:80"

    depends_on:
      - backend

    restart: always